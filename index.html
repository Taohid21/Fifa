    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Poppins', 'Hind Siliguri', 'sans-serif'],
                    }
                }

    <!-- FontAwesome Icon 6.5.1 -->

    <style>
        body {
            font-family: 'Poppins', 'Hind Siliguri', sans-serif;
            background-color: #060913;
        }
        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: #0b0f19; }
        ::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #334155; }

        /* Animation for Messages */
        @keyframes popUp {
            from { opacity: 0; transform: scale(0.95) translateY(10px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }
        .animated-message {
            animation: popUp 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        /* Live pulse */
        .live-glow {
            box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.7);
            animation: livePulse 1.8s infinite;
        }
        @keyframes livePulse {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 8px rgba(16, 185, 129, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); }
        }

        /* Floating Reaction Elements CSS */
        @keyframes floatUp {
            0% { transform: translateY(0) scale(0.8); opacity: 1; }
            100% { transform: translateY(-240px) scale(1.5) rotate(20deg); opacity: 0; }
        }
        .floating-emoji {
            position: absolute;
            bottom: 20px;
            pointer-events: none;
            z-index: 50;
            animation: floatUp 2s cubic-bezier(0.08, 0.82, 0.17, 1) forwards;
            font-size: 28px;
        }

        /* Voice note equalizer bar animations */
        @keyframes wave {
            0%, 100% { height: 4px; }
            50% { height: 20px; }
        }
        .eq-bar {
            width: 3px;
            background-color: #f43f5e;
            animation: wave 1s ease-in-out infinite;
        }
        .eq-bar:nth-child(2) { animation-delay: 0.15s; }
        .eq-bar:nth-child(3) { animation-delay: 0.3s; }
        .eq-bar:nth-child(4) { animation-delay: 0.45s; }

        .admin-glow-card {
            border: 1px solid #eab308;
            box-shadow: 0 0 15px rgba(234, 179, 8, 0.15);
            background: linear-gradient(135deg, #1e1b4b, #111827);
        }
    </style>
</head>

        // --- Stream Playback Module ---
        let hlsInstance = null;

        function loadStream(type, url, serverId) {
            if (playerLoader) playerLoader.classList.remove('hidden');
            if (customControls) customControls.classList.add('hidden');
            
            const viewerRef = ref(db, `sports_v2/active_viewers/${userId}`);
            set(viewerRef, serverId);
            onDisconnect(viewerRef).remove();

            if (type === 'iframe') {
                if (videoPlayer) {
                    videoPlayer.classList.add('hidden');
                    videoPlayer.pause();
                }
                if (iframePlayer) {
                    iframePlayer.src = url;
                    iframePlayer.classList.remove('hidden');
                }
                if (playerLoader) playerLoader.classList.add('hidden');
            } else {
                if (iframePlayer) {
                    iframePlayer.classList.add('hidden');
                    iframePlayer.src = '';
                }
                if (videoPlayer) {
                    videoPlayer.classList.remove('hidden');
                    if (customControls) customControls.classList.remove('hidden');
                }

                // Optimal Streaming Fallback Logic
                const isStreamFormat = url.includes('.m3u8') || url.includes('.ts') || url.toLowerCase().includes('m3u8') || url.includes('manifest');

                if (Hls.isSupported() && isStreamFormat) {
                    if (hlsInstance) hlsInstance.destroy();
                    
                    const hlsConfig = {
                        maxMaxBufferLength: 20,
                        enableWorker: true,
                        lowLatencyMode: true,
                    };
                    hlsInstance = new Hls(hlsConfig);
                    hlsInstance.loadSource(url);
                    if (videoPlayer) {
                        hlsInstance.attachMedia(videoPlayer);
                        hlsInstance.on(Hls.Events.MANIFEST_PARSED, () => {
                            videoPlayer.muted = isAdActive;
                            videoPlayer.play().catch(() => {});
                            if (playerLoader) playerLoader.classList.add('hidden');
                        });
                        hlsInstance.on(Hls.Events.ERROR, function (event, data) {
                            if (data.fatal) {
                                switch (data.type) {
                                    case Hls.ErrorTypes.NETWORK_ERROR:
                                        hlsInstance.startLoad();
                                        break;
                                    case Hls.ErrorTypes.MEDIA_ERROR:
                                        hlsInstance.recoverMediaError();
                                        break;
                                    default:
                                        videoPlayer.src = url;
                                        break;
                                }
                            }
                        });
                    }
                } else {
                    if (videoPlayer) {
                        videoPlayer.src = url;
                        videoPlayer.load();
                        videoPlayer.muted = isAdActive;
                        videoPlayer.play().catch(() => {});
                        if (playerLoader) playerLoader.classList.add('hidden');
                    }
                }
            }
        }

            const indicator = document.getElementById('typing-indicator');
            const userSpan = document.getElementById('typing-user');
            
            if (data) {
                const now = Date.now();
                const typers = Object.values(data).filter(t => 
                    t && 
                    t.isTyping === true && 
                    t.username !== username && 
                    t.timestamp && 
                    (now - t.timestamp < 3000)
                );
                
                if (typers.length > 0 && userSpan && indicator) {
                    userSpan.innerText = typers[0].username;
                    indicator.classList.remove('hidden');
                    return;
                }
            }
            if (indicator) indicator.classList.add('hidden');
        });

        async function uploadImageToImgBB(file) {
            const formData = new FormData();
            formData.append('image', file);
            try {
                const response = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_API_KEY}`, {
                    method: 'POST',
                    body: formData
                });
                const resData = await response.json();
                return resData.data.url;
            } catch (err) {
                return null;
            }
        }

        // Voice recorder module tracking safely checked
        if (recordBtn) {
            recordBtn.addEventListener('click', async () => {
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    mediaRecorder = new MediaRecorder(stream);
                    audioChunks = [];
                    mediaRecorder.ondataavailable = event => audioChunks.push(event.data);
                    
                    if (normalInputBar) normalInputBar.classList.add('hidden');
                    if (voiceRecordingBar) voiceRecordingBar.classList.remove('hidden');

                    mediaRecorder.start();
                } catch (err) {
                    alert("মাইক্রোফোনের অনুমতি পাওয়া যায়নি।");
                }
            });
        }

        if (cancelVoiceBtn) {
            cancelVoiceBtn.addEventListener('click', () => {
                if(mediaRecorder && mediaRecorder.state !== 'inactive') {
                    mediaRecorder.stop();
                    mediaRecorder.onstop = null;
                }
                closeRecordingUX();
            });
        }

        if (finishVoiceBtn) {
            finishVoiceBtn.addEventListener('click', () => {
                if(mediaRecorder && mediaRecorder.state !== 'inactive') {
                    mediaRecorder.onstop = async () => {
                        const audioBlob = new Blob(audioChunks, { type: 'audio/mp3' });
                        const reader = new FileReader();
                        reader.readAsDataURL(audioBlob);
                        reader.onloadend = () => {
                            sendChatMessage(null, null, reader.result);
                        };
                    };
                    mediaRecorder.stop();
                }
                closeRecordingUX();
            });
        }

        function closeRecordingUX() {
            if (voiceRecordingBar) voiceRecordingBar.classList.add('hidden');
            if (normalInputBar) normalInputBar.classList.remove('hidden');
        }

        // Send messages click trigger safely checked
        const sendBtn = document.getElementById('send-btn');
        if (sendBtn) {
            sendBtn.addEventListener('click', () => {
                if (textInput) {
                    const text = textInput.value.trim();
                    if (text) {
                        sendChatMessage(text, null, null);
                        textInput.value = '';
                        clearTimeout(typingTimeout);
                        set(typingRef, null);
                    }
                }
            });
        }

        if (textInput) {
            textInput.addEventListener('keypress', (e) => {
                if(e.key === 'Enter' && sendBtn) sendBtn.click();
            });
        }

        const chatImgInput = document.getElementById('chat-image-input');
        if (chatImgInput) {
            chatImgInput.addEventListener('change', async (e) => {
                const file = e.target.files[0];
                if(file) {
                    const imgUrl = await uploadImageToImgBB(file);
                    if (imgUrl) sendChatMessage(null, imgUrl, null);
                }
            });
        }

        // Master chat function safely inside isolated module scope
        function sendChatMessage(text = null, imageUrl = null, audioUrl = null) {
            const newChatRef = push(chatsRef);
            const msgObj = {
                userId: userId,
                username: username,
                avatar: userAvatar,
                timestamp: Date.now(),
                role: 'user'
            };

            if(text) msgObj.text = text;
            if(imageUrl) msgObj.imageUrl = imageUrl;
            if(audioUrl) msgObj.audioUrl = audioUrl;

            if (replyTarget) {
                msgObj.replyTo = {
                    sender: replyTarget.sender,
                    text: replyTarget.text
                };
                cancelReply();
            }
            set(newChatRef, msgObj);
        }
    </script>
</body>
</html>
